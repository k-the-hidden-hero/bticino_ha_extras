<h2>Multi-Intercom: Vista Mobile</h2>
<p class="subtitle">Come apparirebbe su uno schermo Pixel (~390px wide)</p>

<div class="split">
  <!-- Option A -->
  <div class="mockup" data-choice="a" onclick="toggleSelect(this)" style="cursor:pointer;">
    <div class="mockup-header">A: Tab separati</div>
    <div class="mockup-body" style="padding:0;background:#000;">
      <!-- Phone frame -->
      <div style="width:320px;margin:0 auto;background:#121212;border-radius:28px;overflow:hidden;border:3px solid #333;padding:0;">
        <!-- Status bar -->
        <div style="display:flex;justify-content:space-between;padding:6px 20px 4px;font-size:10px;color:#999;font-family:system-ui;">
          <span>21:54</span>
          <div style="display:flex;gap:4px;align-items:center;">
            <span style="font-size:8px;">5G</span>
            <div style="width:16px;height:9px;border:1px solid #999;border-radius:2px;position:relative;"><div style="position:absolute;left:1px;top:1px;bottom:1px;width:10px;background:#999;border-radius:1px;"></div></div>
          </div>
        </div>
        <!-- HA top bar -->
        <div style="display:flex;align-items:center;padding:8px 16px;background:#1c1c1e;">
          <span style="color:#03a9f4;font-size:14px;margin-right:8px;">&#9664;</span>
          <span style="color:#e1e1e1;font-size:15px;font-weight:500;">Dashboard</span>
        </div>
        <!-- Card -->
        <div style="background:#1c1c1e;border-radius:12px;margin:8px;overflow:hidden;font-family:system-ui;color:#e1e1e1;">
          <!-- Title bar -->
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;">
            <div style="font-size:14px;font-weight:500;">Intercom</div>
            <div style="padding:2px 8px;border-radius:8px;font-size:9px;font-weight:600;background:rgba(76,175,80,0.2);color:#66bb6a;letter-spacing:0.5px;">READY</div>
          </div>
          <!-- Tab row -->
          <div style="display:flex;gap:4px;padding:0 12px 8px;">
            <div style="flex:1;text-align:center;padding:8px 0;border-radius:8px;background:rgba(3,169,244,0.15);color:#29b6f6;font-size:12px;font-weight:600;">Strada</div>
            <div style="flex:1;text-align:center;padding:8px 0;border-radius:8px;background:rgba(255,255,255,0.06);color:#9e9e9e;font-size:12px;">Ingresso</div>
          </div>
          <!-- Video area -->
          <div style="aspect-ratio:4/3;background:#0a0a0a;display:flex;align-items:center;justify-content:center;position:relative;border-radius:6px;margin:0 4px;">
            <!-- Poster placeholder -->
            <div style="width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;">
              <div style="width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.4);">
                <div style="width:0;height:0;border-left:20px solid #1c1c1e;border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:4px;"></div>
              </div>
            </div>
            <!-- Swipe dots -->
            <div style="position:absolute;bottom:8px;display:flex;gap:6px;">
              <div style="width:7px;height:7px;border-radius:50%;background:#29b6f6;"></div>
              <div style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);"></div>
            </div>
          </div>
          <!-- Action bar -->
          <div style="display:flex;gap:3px;padding:10px 12px 12px;justify-content:center;">
            <div style="flex:1;max-width:90px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px 8px;border-radius:10px;background:rgba(255,255,255,0.06);color:#9e9e9e;">
              <svg style="width:20px;height:20px;fill:currentColor;" viewBox="0 0 24 24"><path d="M12,3C6.5,3 2,6.6 2,11C2,13.1 3,15.1 4.8,16.5L4,19.5L7.3,18.1C8.8,18.7 10.4,19 12,19C17.5,19 22,15.4 22,11S17.5,3 12,3Z"/></svg>
              <span style="font-size:10px;font-weight:500;">Cancello</span>
            </div>
            <div style="flex:1;max-width:90px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px 8px;border-radius:10px;background:rgba(255,255,255,0.06);color:#9e9e9e;">
              <svg style="width:20px;height:20px;fill:currentColor;" viewBox="0 0 24 24"><path d="M12,6A6,6 0 0,1 18,12C18,14.22 16.79,16.16 15,17.2V19A1,1 0 0,1 14,20H10A1,1 0 0,1 9,19V17.2C7.21,16.16 6,14.22 6,12A6,6 0 0,1 12,6M14,21V22A1,1 0 0,1 13,23H11A1,1 0 0,1 10,22V21H14M20,11H23V13H20V11M1,11H4V13H1V11M13,1V4H11V1H13Z"/></svg>
              <span style="font-size:10px;font-weight:500;">Luci</span>
            </div>
            <div style="flex:1;max-width:90px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px 8px;border-radius:10px;background:rgba(255,255,255,0.06);color:#9e9e9e;">
              <svg style="width:20px;height:20px;fill:currentColor;" viewBox="0 0 24 24"><path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1Z"/></svg>
              <span style="font-size:10px;font-weight:500;">Apri Tutti</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
