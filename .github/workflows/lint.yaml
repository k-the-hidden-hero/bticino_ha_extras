name: CI

on:
  push:
    branches: [main, dev/*]
  pull_request:
    branches: [main, dev/*]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ESLint
        run: npm install --save-dev eslint

      - name: Run ESLint
        run: npx eslint dist/

      - name: Run Prettier check
        run: npx prettier --check "dist/**/*.js" "*.json" "*.yaml" ".github/**/*.yaml"

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: plugin
